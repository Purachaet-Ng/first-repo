<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>My spotifer (tailwind)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <div class="bg-black fixed inset-0 -z-10 ">
        <div class="text-white  min-h-screen">

            <div class="bg-linear-to-b from bg-blue-900 to-black " >
            <!-- Profile Section -->
            <div class="flex flex-col items-center ">
                <h1 class="text-2xl m-2">My Spotifer</h1>
                <img class="w-30 rounded-full" src="https://picsum.photos/id/64/200" alt="profile pics">
                <button class="m-2 px-4 py-1.5 bg-slate-700 rounded-2xl text-slate-100">Edit Profile</button>

            </div>

            <!-- PLAYLIST-FOLLOWER-FOLLOWING -->
            <div class="">
                <div class="flex justify-around text-sm my-2 text-[12px]">
                    <div class="flex flex-col text-center">
                        <p>23</p>
                        <p>PLAYLIST</p>
                    </div>
                    <div class="flex flex-col text-center">
                        <p>58</p>
                        <p>FOLLOWER</p>
                    </div>
                    <div class="flex flex-col text-center">
                        <p>43</p>
                        <p>FOLLOWING</p>
                    </div>
                </div>
            </div>
            </div>

            <!-- Playlist Section -->
            <div class="px-4">
                <p class="text-[20px]">Playlists</p>
                <div class="flex justify-between mt-4">
                    <div class="flex flex-start">
                        <img class="w-[75px] rounded-md" src="https://picsum.photos/id/38/200" alt="">
                        <div class="flex flex-col justify-around px-2 text-[18px]">
                            <p>ABC</p>
                            <p>67 likes</p>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <i class="fa-solid fa-greater-than"></i>
                    </div>
                </div>
                <div class="flex justify-between mt-1">
                    <div class="flex flex-start">
                        <img class="w-[75px] rounded-md" src="https://picsum.photos/id/32/200" alt="">
                        <div class="flex flex-col justify-around px-2 text-[18px]">
                            <p>DEF</p>
                            <p>103 likes</p>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <i class="fa-solid fa-greater-than"></i>
                    </div>
                </div>
                <div class="flex justify-between mt-1">
                    <div class="flex flex-start">
                        <img class="w-[75px] rounded-md" src="https://picsum.photos/id/33/200" alt="">
                        <div class="flex flex-col justify-around px-2 text-[18px]">
                            <p>GHI</p>
                            <p>12 likes</p>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <i class="fa-solid fa-greater-than"></i>
                    </div>
                </div>
                <div class="flex justify-between">
                    <p class="mt-2">See all playlists</p>
                    <p>></p>
                </div>
            </div>

            <!--Bottom button -->
            <div class="flex justify-around fixed bottom-0 w-full">
                <div class="text-center ">
                    <i class="fa-solid fa-house"></i>
                    <p>home</p>
                </div>
                <div class="text-center ">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <p>Search</p>
                </div>
                <div class="text-center">
                    <i class="fa-solid fa-book"></i>
                    <p>Your Library</p>
                </div>
            </div>
        </div>

    </div>
    </div>
</body>

</html>
